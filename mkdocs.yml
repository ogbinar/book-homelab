---
site_name: "Bahay Bahayan: Build Your First Homelab"
site_description: >
  Start Small. Learn Fast. Build What's Yours.
  A Filipino-first guide to building your homelab.
site_url: https://book-homelab.pages.dev
repo_url: https://github.com/ogbinar/book-homelab
repo_name: ogbinar/book-homelab
copyright: "Bahay Bahayan is released under CC BY-SA 4.0. Free forever."

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to Cyberpunk mode
    - media: "(prefers-color-scheme: light)"
      scheme: cyberpunk
      primary: pink
      accent: cyan
      toggle:
        icon: material/lightbulb
        name: Switch to Matrix mode
    - media: "(prefers-color-scheme: dark)"
      scheme: matrix
      primary: green
      accent: lime
      toggle:
        icon: material/console
        name: Switch to Synthwave mode
    - media: "(prefers-color-scheme: dark)"
      scheme: synthwave
      primary: purple
      accent: orange
      toggle:
        icon: material/palette
        name: Switch to Ocean mode
    - media: "(prefers-color-scheme: dark)"
      scheme: ocean
      primary: blue
      accent: cyan
      toggle:
        icon: material/waves
        name: Switch to Bahay Bahayan mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.footer
    - search.highlight
    - search.share
    - content.code.copy
    - content.tooltips
  icon:
    repo: fontawesome/brands/github
    admonition:
      quote: material/book-open-page-variant

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ogbinar/book-homelab
    - icon: fontawesome/brands/discord
      link: https://discord.gg/bahay-bahayan
  generator: false

extra_css:
  - assets/custom.css

plugins:
  - search:
      lang: en
      separator: >
        [\s\u200b\-_,:!=\[\]()\/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])
  - social:
      cards: true
      cards_layout_options:
        background_color: "#E65100"
        color: "#FFFFFF"
  - git-revision-date

markdown_extensions:
  - attr_list
  - md_in_html
  - def_list
  - tables
  - footnotes
  - toc:
      permalink: "#"
      baselevel: 1
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.keys
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - admonition
  - pymdownx.details

nav:
  - Home: index.md
  - "Part I: Bahay Bahayan":
      - part-i.md
      - "Ch 1: Ano ba ang Homelab?": chapters/chapter-01.md
      - "Ch 2: Your First Server": chapters/chapter-02.md
      - "Ch 3: Hello, Container": chapters/chapter-03.md
      - "Ch 4: Something Useful": chapters/chapter-04.md
      - "Ch 5: Keeping It Alive": chapters/chapter-05.md
      - "Ch 6: Your First Network": chapters/chapter-06.md
  - "Part II: Lumaki":
      - part-ii.md
      - "Ch 7: The Reverse Proxy + Remote Access": chapters/chapter-07.md
      - "Ch 8: Multiple Services, One System": chapters/chapter-08.md
      - "Ch 9: Your Data, Safe": chapters/chapter-09.md
      - "Ch 10: Automation: Work Less": chapters/chapter-10.md
      - "Ch 11: Monitoring: Eyes on Everything": chapters/chapter-11.md
      - "Ch 12: Security: Don't Get Hacked": chapters/chapter-12.md
      - "Ch 13: Your Homelab Portfolio": chapters/chapter-13.md
  - Appendices:
      - "A: About the Author": appendix/author.md
      - "B: Glossary": appendix/glossary.md
      - "C: Hardware Buying Guide": appendix/hardware.md
      - "D: Common Errors": appendix/errors.md
      - "E: Service Directory": appendix/services.md
      - "F: Community": appendix/community.md
      - "G: Commands Reference": appendix/commands.md
