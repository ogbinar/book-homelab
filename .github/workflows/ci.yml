name: Deploy MkDocs site and PDF to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          cache: "pip"

      - name: Install system dependencies for PDF generation
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            shared-mime-info

      - name: Install yamllint
        run: pip install yamllint

      - name: Check MkDocs YAML configuration
        run: yamllint ./mkdocs.yml
        continue-on-error: true

      - name: Check Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            docs/**/*.md
            *.md
            !.github/**/*.md
          config: .markdownlint.json
        continue-on-error: true

      - name: Install required Python packages
        run: pip install -r requirements.txt

      - name: Build site and PDF
        run: |
          mkdocs build \
            --config-file ./mkdocs.yml \
            --site-dir ./_site
        env:
          CI: true
          ENABLE_PDF_EXPORT: 1

      - name: Verify generated files
        run: |
          echo "=== Generated Site Structure ==="
          find ./_site | head -100

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: mkdocs-pdf
          path: ./_site/pdf/book.pdf
          if-no-files-found: warn

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
